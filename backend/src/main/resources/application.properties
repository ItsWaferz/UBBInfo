spring.application.name=ubbinfo-api
# Cloud Run (and most PaaS) inject the port via $PORT; fall back to 8080 locally.
server.port=${PORT:8080}

# Serialize JSON in snake_case to match the shape the React frontend already
# consumes (it was built around Supabase's snake_case columns).
spring.jackson.property-naming-strategy=SNAKE_CASE

# ============================================================
# Supabase PostgreSQL
# ------------------------------------------------------------
# Two ways to connect to Supabase Postgres:
#   1. Direct:  db.jzqlxndlqfbenejndaib.supabase.co:5432  (IPv6-only on the free plan)
#   2. Session pooler (Supavisor): <region>.pooler.supabase.com:5432  (IPv4-friendly)
# The pooler is the safer default for a JPA connection pool. Confirm your
# project's region + pooler host in: Supabase Dashboard -> Project Settings -> Database.
# Username for the pooler is "postgres.<project-ref>"; for a direct connection it is "postgres".
# ============================================================
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SUPABASE_DB_USER:postgres.jzqlxndlqfbenejndaib}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# The Supabase schema is the source of truth -> never let Hibernate touch DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
# Pin the dialect + skip boot-time JDBC metadata lookups so the app can start
# without an immediate DB round-trip (lets us test JWT/auth before DB creds are final).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
# Don't fail startup if the pool can't reach the DB yet (dev convenience).
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.minimum-idle=0
# Keep the pool modest against the Supabase pooler (avoid auth-storm circuit breaker).
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# ============================================================
# Supabase Auth (JWT)
# ------------------------------------------------------------
# This project signs USER access tokens with ES256 (asymmetric signing keys).
# Spring validates them against the project's public JWKS — no shared secret needed.
# (The legacy HS256 JWT secret is NOT used for user tokens here.)
# ============================================================
supabase.jwks-uri=https://jzqlxndlqfbenejndaib.supabase.co/auth/v1/.well-known/jwks.json
supabase.jwt-issuer=https://jzqlxndlqfbenejndaib.supabase.co/auth/v1
supabase.url=https://jzqlxndlqfbenejndaib.supabase.co
# Service-role key (admin) — needed ONLY to create auth users during the admitted-students
# import (feature #4). Secret: set via env, never commit. Without it, import is disabled.
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

# Multipart upload limits for the admitted-students import file.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# External account provisioning (Microsoft Exchange/Graph). Off for now —
# only in-app "academic" accounts are created. Flip on once the faculty grants access.
app.provisioning.exchange.enabled=${EXCHANGE_PROVISIONING_ENABLED:false}

# CORS — React dev origins (Vite default 5173; --host may also expose others).
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# Timefold Solver (timetable generation, feature #3)
# ------------------------------------------------------------
# Per-draft solve budget. The generation service builds its own SolverFactory
# (varying the random seed per draft); this just satisfies the auto-config.
# ============================================================
timefold.solver.termination.spent-limit=8s
# 8s is the benchmarked sweet spot: on realistic (loose) loads it improves the
# soft score over 5s while staying feasible, and it is the last budget that
# stays feasible (0 hard) even on a near-infeasible dense instance — beyond ~8s
# the search can wander past feasibility on tight problems. See
# TimetableBenchmarkTest.
app.orar.solve-seconds=${ORAR_SOLVE_SECONDS:8}

# ============================================================
# JDBC write batching — publish/compute loops update one row per student;
# without batching each row is a separate round-trip to the remote Supabase DB.
# ============================================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
# Batch remaining lazy-association loads (IN (...) of up to 50 ids) instead of
# one remote round-trip per row — the DB is ~30-100ms away.
spring.jpa.properties.hibernate.default_batch_fetch_size=50
